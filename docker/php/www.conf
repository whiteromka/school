[www]
user = appuser
group = appgroup
listen = 0.0.0.0:9000

pm = static
pm.max_children = 64
pm.max_requests = 500

; Оптимизация: разрешаем больше соединений
listen.backlog = 4096
; listen.allowed_clients — по умолчанию принимает все подключения

; Таймауты
request_terminate_timeout = 60
slowlog = /proc/self/fd/2
request_slowlog_timeout = 5s

; Переменные окружения
env[APP_ENV] = local
