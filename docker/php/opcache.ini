; Включает OPcache (кеш скомпилированного байт-кода PHP)
opcache.enable=1

; Отключает OPcache для CLI-скриптов (artisan, php скрипты из консоли)
; Чтобы artisan команды не кешировали код
opcache.enable_cli=0

; Объём памяти (МБ) для хранения скомпилированных PHP-скриптов
; 512 МБ — много, подходит для больших проектов
opcache.memory_consumption=512

; Память (МБ) для хранения дублирующихся строк
; Экономит память, если в проекте много одинаковых строк
opcache.interned_strings_buffer=32

; Максимальное количество файлов, которые можно закешировать
; 50000 — с запасом для крупных Laravel-проектов
opcache.max_accelerated_files=50000

; ВАЖНО для разработки:
; 0 = НЕ проверять изменения файлов (код кешируется навечно, нужен перезапуск php-fpm)
; 1 = проверять изменения файлов (при изменении .php/.blade.php кеш обновится автоматически)
; Для продакшена: 0 (максимальная скорость)
; Для разработки: 1 (чтобы видеть изменения без перезапуска)
opcache.validate_timestamps=1

; Как часто (в секундах) проверять изменения файлов (работает только при validate_timestamps=1)
; 2 = проверять каждые 2 секунды
; Для продакшена можно не указывать или ставить 60+
opcache.revalidate_freq=2
