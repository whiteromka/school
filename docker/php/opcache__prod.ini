; Включает OPcache (кеш скомпилированного байт-кода PHP)
opcache.enable=1

; Отключает OPcache для CLI (artisan, cron, консоль)
; В проде обычно оставляют 0 (CLI не кешируется)
opcache.enable_cli=0

; Объём памяти под OPcache (МБ)
; 256–512 MB — нормально для Laravel
opcache.memory_consumption=512

; Память для interned strings
; ускоряет работу с повторяющимися строками
opcache.interned_strings_buffer=32

; Максимум файлов в кеше
; Laravel + vendor + packages = много файлов
opcache.max_accelerated_files=50000

; ---------------------------
; ⚡ PRODUCTION OPTIMIZATION
; ---------------------------

; ❌ В проде НЕ проверяем изменения файлов
; иначе OPcache теряет смысл (нагрузка на FS)
opcache.validate_timestamps=0

; ❌ не используется в production, потому что проверки отключены
opcache.revalidate_freq=0
