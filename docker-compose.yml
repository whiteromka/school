services:
  app:
    env_file:
      - .env
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: ${UID}
        GID: ${GID}
        WITH_XDEBUG: "false"
    user: "${UID}:${GID}"
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
    # прод
    #environment:
    #  APP_ENV: production
    #  APP_DEBUG: "false"
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    env_file:
      - .env
    image: mysql:8.1
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    volumes:
      - db_data_new:/var/lib/mysql
volumes:
  db_data_new:
