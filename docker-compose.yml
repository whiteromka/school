services:
    app:
        env_file:
            - .env
        build:
            context: .   # Для прода root проекта
            dockerfile: docker/php/Dockerfile
            args:
                UID: ${UID}
                GID: ${GID}
                WITH_XDEBUG: "false"
        user: "${UID}:${GID}"
        depends_on:
            - db
        restart: unless-stopped

    nginx:
        build:
            context: .
            dockerfile: docker/nginx/Dockerfile
        ports:
            - "8080:80"
        depends_on:
            - app

    db:
        env_file:
            - .env
        image: mysql:8.1
        command: --default-authentication-plugin=mysql_native_password
        volumes:
            - db_data_new:/var/lib/mysql
        restart: unless-stopped
        #  не открываем в проде
        # ports:
        #   - "3306:3306"

volumes:
    db_data_new:
