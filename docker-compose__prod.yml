services:
  app:
    env_file:
      - .env
    build:
      context: ./docker/php
      dockerfile: Dockerfile
      args:
        UID: ${UID}
        GID: ${GID}
        WITH_XDEBUG: "false"
    user: "${UID}:${GID}"
    depends_on:
      - db
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

  db:
    env_file:
      - .env
    image: mysql:8.1
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data_new:/var/lib/mysql
    restart: unless-stopped
    # ВАЖНО: в проде НЕ открываем порт наружу
    # ports:
    #   - "3306:3306"

volumes:
  db_data_new:
